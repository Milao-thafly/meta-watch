name: ci-metawatch

on:
  push:
    branches: 
      - 'features/**'
  pull_request:
    branches:
      - 'main/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Docker version
        run: docker --version

      - name: Build Docker image with correct UID
        run: |
          echo "L'utilisateur actuel (UID) est : $(id -u)"
          echo "Le nom de cet utilisateur est : $(whoami)"
          echo "Les infos détaillées du compte :"
          getent passwd $(id -u)
          echo "Le propriétaire du dossier est :"
          ls -ld /home/runner/work/ton-repo/ton-repo/Backend

      - name: Log container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.META_WATCH_TOKEN }}

          
      
      - name: Run Deploy with Makefile
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: make deploy DATABASE_URL="${DATABASE_URL}"

      - name: Debug files before deploy
        run: |
          ls -la Backend/
